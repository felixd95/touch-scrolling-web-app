type Participant @model @auth(rules: [{allow: public, provider: apiKey}])
{
  firstName: String!
  lastName: String!
  email: AWSEmail!
  birthDate: AWSDate!
  privateSmartphone: String!
  screenTimePerDay: String!
  attempts: [AWSJSON]
  nextParameterSet: AWSJSON
}

type Result @model @auth(rules: [{allow: public, provider: apiKey}])
{
  participantId: ID!
  timeMs: String!
  scrollDistance: String!
  timestamp: String!
  multiplierUsed: String!
}

type TriggerNextParameterSetResult @aws_api_key
{
  nextParameterSet: String!
}

type Mutation {
  triggerNextParameterSet(participantId: ID!, attemptCount: Int!): TriggerNextParameterSetResult @function(name: "FnTriggerNextParameterSet") @auth(rules: [{allow: public, provider: apiKey}])
}